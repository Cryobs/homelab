---
# Recursive directory structure creator from nested dict
# 
# Use:
# structure:
#   data:
#     forgejo: {}
#     photoprism:
#       originals: {}
#       storage: {}
#   backups: {}
#
# Creates:
# /mnt/cryobs/data/
# /mnt/cryobs/data/forgejo/
# /mnt/cryobs/data/photoprism/
# /mnt/cryobs/data/photoprism/originals/
# /mnt/cryobs/data/photoprism/storage/
# /mnt/cryobs/backups/

- name: Create directories from structure
  file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ dir_owner }}"
    group: "{{ dir_group }}"
    mode: "{{ dir_mode }}"
  loop: "{{ structure | dict_to_paths(base_path) }}"
  loop_control:
    label: "{{ item.path }}"

- name: Helper to flatten nested dict into paths
  set_fact:
    _dummy: ""  # Placeholder, logic in filter plugin
