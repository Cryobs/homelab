---
- name: Check if swap file exists
  stat:
    path: "{{ swap_file_path }}"
  register: swap_file_check

- name: Create swap file
  command: dd if=/dev/zero of={{ swap_file_path }} bs=1M count={{ swap_file_size_mb }}
  when: not swap_file_check.stat.exists

- name: Set swap file permissions
  file:
    path: "{{ swap_file_path }}"
    owner: root
    group: root
    mode: '0600'

- name: Format swap file
  command: mkswap {{ swap_file_path }}
  when: not swap_file_check.stat.exists
  register: mkswap_result

- name: Enable swap file
  command: swapon {{ swap_file_path }}
  when: mkswap_result.changed

- name: Add swap to fstab
  lineinfile:
    path: /etc/fstab
    regexp: "^{{ swap_file_path }}"
    line: "{{ swap_file_path }} none swap sw 0 0"
    state: present

- name: Set swappiness
  sysctl:
    name: vm.swappiness
    value: "{{ swap_swappiness }}"
    state: present
    reload: true

- name: Check swap status
  command: swapon --show
  register: swap_status
  changed_when: false

- name: Display swap status
  debug:
    var: swap_status.stdout_lines
