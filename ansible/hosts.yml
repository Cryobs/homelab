all:
  children:
    homelab:
      hosts:
        raspi:
          ansible_host: raspi.local  
          ansible_user: cryobs
          ansible_python_interpreter: /usr/bin/python3
          
      vars:
        # Base paths
        homelab_base_dir: /mnt/cryobs
        homelab_services_dir: "{{ homelab_base_dir }}/services"
        homelab_data_dir: "{{ homelab_base_dir }}/data"
        homelab_backups_dir: "{{ homelab_base_dir }}/backups"
        
        # Network
        homelab_network_name: homelab
        homelab_subnet: 172.20.0.0/16
        
        # Domain
        homelab_domain: "{{ vault_cloudflare_domain }}"
        
        # Cloudflare Tunnel
        cloudflare_tunnel_enabled: true
