---
ansible_ssh_private_key_file: ~/.ssh/laptop_key
ansible_python_interpreter  : /usr/bin/python3

public_key_file: "~/.ssh/laptop_key.pub"

ufw_rules:
  # WireGuard VPN
  - port: '51820'
    proto: udp
    rule: allow
    log: false

wg_addr: "10.8.8.1"
wg_addr_mask: "24"
wg_port: 51820
wg_if_name: "homelab"
wg_allowed_ips: "10.8.8.0/24"
